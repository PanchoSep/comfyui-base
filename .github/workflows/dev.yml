name: Dev Build

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push to Docker Hub"
        type: boolean
        required: true
        default: true

jobs:
  dev:
    runs-on: blacksmith-8vcpu-ubuntu-2204
    outputs:
      image-refs: ${{ steps.refs.outputs.refs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Clear space to remove unused folders
        run: |
          rm -rf /usr/share/dotnet
          rm -rf /opt/ghc
          rm -rf "/usr/local/share/boost"
          rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: inputs.push == true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push CUDA 13.0 dev image
        id: build-cuda13
        uses: docker/bake-action@v5
        with:
          push: ${{ inputs.push }}
          files: ./docker-bake.hcl
          targets: |
            devpush-cuda13

      - name: Extract image refs
        id: refs-cuda13
        uses: ./.github/actions/image-name
        with:
          bake-metadata: ${{ steps.build-cuda13.outputs.metadata }}

      - name: Clean up Docker build cache
        run: |
          docker builder prune -af --filter "until=1h"
          docker system prune -af --volumes

      - name: Build and push regular dev image
        id: build-regular
        uses: docker/bake-action@v5
        with:
          push: ${{ inputs.push }}
          files: ./docker-bake.hcl
          targets: |
            devpush

      - name: Extract image refs
        id: refs-regular
        uses: ./.github/actions/image-name
        with:
          bake-metadata: ${{ steps.build-regular.outputs.metadata }}

      - name: Combine image refs
        id: refs
        shell: bash
        env:
          CUDA13_REFS: ${{ steps.refs-cuda13.outputs.refs }}
          REGULAR_REFS: ${{ steps.refs-regular.outputs.refs }}
        run: |
          set -euo pipefail
          REFS=$(jq -c -n \
            --argjson cuda13 "${CUDA13_REFS}" \
            --argjson regular "${REGULAR_REFS}" \
            '$cuda13 + $regular | unique')
          echo "refs=${REFS}" >> "${GITHUB_OUTPUT}"
          echo "Combined image refs:"
          echo "${REFS}" | jq -r '.[]'


  test-dev:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: dev
    if: needs.dev.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Smoke test
        uses: ./.github/actions/smoke-test
        with:
          image-refs: ${{ needs.dev.outputs.image-refs }}
          profile: base
          runpod-api-key: ${{ secrets.TESTING_RUNPOD_API_KEY }}
          ssh-private-key: ${{ secrets.TESTING_RUNPOD_SSH_PRIVATE_KEY }}
          test-jupyter: true
          on-skip: "warn"
          check_all_gpu: true
          test_ports: |
            - 8188
            - 8080
