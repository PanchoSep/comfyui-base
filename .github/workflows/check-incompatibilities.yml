name: Check Incompatibilities

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image to check"
        type: string
        required: true
        default: "runpod/comfyui:cuda13.0"
  # TEMP — remove this whole `pull_request:` block once the job is verified.
  # It exists only so the workflow can be exercised from a PR before it's on
  # the default branch (workflow_dispatch isn't offered until then). Note
  # pull_request does NOT support `inputs:` (only workflow_dispatch /
  # workflow_call do), so on a PR event `inputs.image` is empty and the
  # "Resolve image ref(s)" step below falls back to the default image.
  pull_request:
    paths:
      - ".github/workflows/check-incompatibilities.yml"
      - ".github/actions/smoke-test/**"
      - "tests/**"

jobs:
  check-incompatibilities:
    runs-on: blacksmith-8vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve image ref(s)
        id: img
        shell: bash
        env:
          # Only set on workflow_dispatch; empty on pull_request.
          IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail
          IMAGE="${IMAGE:-runpod/comfyui:cuda13.0}"
          # smoke-test expects image-refs as a JSON array, not a bare ref.
          printf 'refs=["%s"]\n' "${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "Checking image: ${IMAGE}"

      - name: Check incompatibilities
        uses: ./.github/actions/smoke-test
        with:
          image-refs: ${{ steps.img.outputs.refs }}
          profile: base
          runpod-api-key: ${{ secrets.TESTING_RUNPOD_API_KEY }}
          ssh-private-key: ${{ secrets.TESTING_RUNPOD_SSH_PRIVATE_KEY }}
          test-jupyter: true
          check_all_gpu: true
          manufacturer: Nvidia
          on-skip: pass
          test_ports: |
            - 8188
            - 8080
