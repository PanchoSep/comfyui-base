name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*" # Trigger on version tags like v1.0.0, v2.1.0, etc.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v2.8.0)"
        required: true
        type: string

permissions:
  contents: write # Required for creating GitHub releases

jobs:
  build-and-push:
    runs-on: blacksmith-8vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Clear space to remove unused folders
        run: |
          rm -rf /usr/share/dotnet
          rm -rf /opt/ghc
          rm -rf "/usr/local/share/boost"
          rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set environment variables
        run: |
          echo "IMAGE_REF=runpod/comfyui" >> $GITHUB_ENV

          # Determine version based on trigger type
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger: use input version
            VERSION="${{ github.event.inputs.version }}"
            echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
            echo "IS_MANUAL_RELEASE=true" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            # GitHub Release published event
            VERSION="${{ github.event.release.tag_name }}"
            echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
            echo "IS_MANUAL_RELEASE=false" >> $GITHUB_ENV
          else
            # Tag trigger: use tag name (remove refs/tags/ prefix)
            VERSION=${GITHUB_REF#refs/tags/}
            echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
            echo "IS_MANUAL_RELEASE=false" >> $GITHUB_ENV
          fi

          # Export TAG for docker-bake.hcl variable override
          echo "TAG=${RELEASE_VERSION}" >> $GITHUB_ENV

      - name: Build and push CUDA 13.0 image
        id: build-cuda13
        uses: docker/bake-action@v5
        env:
          TAG: ${{ env.RELEASE_VERSION }}
        with:
          push: true
          files: ./docker-bake.hcl
          targets: |
            cuda13

      - name: Extract image refs
        id: refs-cuda13
        uses: ./.github/actions/image-name
        with:
          bake-metadata: ${{ steps.build-cuda13.outputs.metadata }}

      - name: Clean up Docker build cache
        run: |
          docker builder prune -af --filter "until=1h"
          docker system prune -af --volumes

      - name: Build and push regular image
        id: build-regular
        uses: docker/bake-action@v5
        env:
          TAG: ${{ env.RELEASE_VERSION }}
        with:
          push: true
          files: ./docker-bake.hcl
          targets: |
            regular

     - name: Extract image refs
        id: refs-regular
        uses: ./.github/actions/image-name
        with:
          bake-metadata: ${{ steps.build-regular.outputs.metadata }}

      - name: Combine image refs
        id: refs
        shell: bash
        env:
          CUDA13_REFS: ${{ steps.refs-cuda13.outputs.refs }}
          REGULAR_REFS: ${{ steps.refs-regular.outputs.refs }}
        run: |
          set -euo pipefail
          REFS=$(jq -c -n \
            --argjson cuda13 "${CUDA13_REFS}" \
            --argjson regular "${REGULAR_REFS}" \
            '$cuda13 + $regular | unique')
          # Write to a file for the artifact handoff to test-dev. (Job
          # outputs can't be used here — they get scrubbed because the
          # refs contain the DOCKERHUB_USERNAME secret; see job comment.)
          mkdir -p "${RUNNER_TEMP}/refs"
          printf '%s\n' "${REFS}" > "${RUNNER_TEMP}/refs/image-refs.json"
          echo "Combined image refs:"
          echo "${REFS}" | jq -r '.[]'

      - name: Upload image refs artifact
        if: inputs.push == true
        uses: actions/upload-artifact@v4
        with:
          name: dev-image-refs
          path: ${{ runner.temp }}/refs/image-refs.json
          retention-days: 1
          if-no-files-found: error

  test:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Download image refs artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-image-refs
          path: ${{ runner.temp }}/refs

      - name: Read image refs
        id: refs
        shell: bash
        run: |
          set -euo pipefail
          REFS=$(cat "${RUNNER_TEMP}/refs/image-refs.json")
          echo "refs=${REFS}" >> "${GITHUB_OUTPUT}"
          echo "Image refs to smoke-test:"
          echo "${REFS}" | jq -r '.[]'

      - name: Smoke test
        uses: ./.github/actions/smoke-test
        with:
          image-refs: ${{ steps.refs.outputs.refs }}
          profile: base
          runpod-api-key: ${{ secrets.TESTING_RUNPOD_API_KEY }}
          ssh-private-key: ${{ secrets.TESTING_RUNPOD_SSH_PRIVATE_KEY }}
          test-jupyter: true
          on-skip: "warn"
          test_ports: |
            - 8188
            - 8080

  release-comfyui:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    needs: build-and-push
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name != 'release'
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "🚀 Release completed!"
          echo "Version: ${{ env.RELEASE_VERSION }}"
          echo "Docker Images:"
          echo " - ${{ env.IMAGE_REF }}:${{ env.RELEASE_VERSION }}-cuda12.8 (CUDA 12.8)"
          echo " - ${{ env.IMAGE_REF }}:cuda12.8"
          echo " - ${{ env.IMAGE_REF }}:latest"
          echo " - ${{ env.IMAGE_REF }}:${{ env.RELEASE_VERSION }}-cuda13.0 (CUDA 13.0)"
          echo " - ${{ env.IMAGE_REF }}:cuda13.0"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Trigger: Manual workflow dispatch"
          else
            echo "Trigger: GitHub release (tag: ${{ github.ref_name }})"
          fi
